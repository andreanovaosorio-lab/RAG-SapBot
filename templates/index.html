<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SalesBot - Manual de usuario SAP SALES</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Asistente RAG</p>
            <h1>SalesBot</h1>
          </div>
          <p class="role">Agente personalizado para el Manual de usuario SAP SALES</p>
        </header>

        <div id="messages" class="messages" aria-live="polite">
          <article class="message bot">
            <p>Hola, soy Ana, tu agente personalizado SAP Sales. Hazme una pregunta sobre el manual de usuario y te ayudare con ella.</p>
          </article>
        </div>

        <form id="question-form" class="composer">
          <textarea id="question" name="question" rows="3" placeholder="Ejemplo: ¿Cómo se realiza una venta?" required></textarea>
          <button type="submit">Preguntar</button>
        </form>
      </section>

      <aside class="sources-panel">
        <h2>Fuentes recuperadas</h2>
        <div id="sources" class="sources-empty">
          Los fragmentos usados apareceran aqui despues de cada pregunta.
        </div>
      </aside>
    </main>

    <script>
      const form = document.querySelector("#question-form");
      const input = document.querySelector("#question");
      const messages = document.querySelector("#messages");
      const sources = document.querySelector("#sources");

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function addMessage(text, type) {
        const article = document.createElement("article");
        article.className = `message ${type}`;
        article.innerHTML = `<p>${escapeHtml(text).replaceAll("\n", "<br>")}</p>`;
        messages.appendChild(article);
        messages.scrollTop = messages.scrollHeight;
      }

      function renderSources(chunks) {
        if (!chunks || chunks.length === 0) {
          sources.className = "sources-empty";
          sources.textContent = "No se recuperaron fragmentos con suficiente relevancia.";
          return;
        }

        sources.className = "sources-list";
        sources.innerHTML = chunks.map((chunk) => `
          <article class="source-card">
            <div class="source-meta">
              <span>Pagina ${chunk.page ?? "?"}</span>
              <span>Relevancia ${chunk.score ?? "N/A"}</span>
            </div>
            <p>${escapeHtml(chunk.content)}</p>
          </article>
        `).join("");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const question = input.value.trim();
        if (!question) return;

        addMessage(question, "user");
        input.value = "";
        addMessage("Consultando el manual...", "bot loading");

        const loading = messages.querySelector(".loading");

        try {
          const response = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question }),
          });
          const data = await response.json();
          loading.remove();

          if (!response.ok) {
            addMessage(data.error || "Ocurrio un error al consultar.", "bot error");
            return;
          }

          addMessage(data.answer, "bot");
          renderSources(data.chunks);
        } catch (error) {
          loading.remove();
          addMessage("No se pudo conectar con el servidor Flask.", "bot error");
        }
      });
    </script>
  </body>
</html>
